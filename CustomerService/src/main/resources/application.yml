server:
  port: 9001
  
spring:
  application:
    name: CustomerService
    
  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    password: dnyan@123
    url: jdbc:mysql://localhost:3306/loanapp
    username: root
    
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL57Dialect
    show-sql: true
    
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka

logging:
  file:
    name: logs/customer-service.log
  level:
    com:
      example:
        demo: DEBUG
    root: INFO
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 10
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n'      